server:
  port: 8090
spring:
  application:
    name: ec-workbench
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://127.0.0.1:3306/ec_workbench?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${DB_USER:root}
    password: ${DB_PASS:}
mybatis:
  mapper-locations: classpath:/mapper/**/*.xml
  type-aliases-package: com.ec.workbench.module
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
jwt:
  secret: ${JWT_SECRET:}
  expire-seconds: 7200
  token-prefix: "Bearer "
  header-name: "Authorization"
deepseek:
  api-key: ${DEEPSEEK_API_KEY:}
  api-url: https://api.deepseek.com/chat/completions
