services:
  mysql:
    image: 'mysql:latest'
    environment:
      - 'MYSQL_DATABASE=${MYSQL_DATABASE:ec_workbench}'
      - 'MYSQL_USER=${MYSQL_USER:ec_app}'
      - 'MYSQL_PASSWORD=${MYSQL_PASSWORD:change_me}'
      - 'MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:change_me_root}'
    ports:
      - '3306:3306'
